name: "Bright Frontal Scene"
description: "A template for a simple, brightly lit studio scene with a frontal camera view."

# Lighting setup for the scene.
lighting:
  style: "bright warm soft light"
  direction: "frontal"
  intensity: "high"
  shadows: "soft, minimal"

# Camera and framing setup.
camera:
  angle: "front view, eye-level"
  distance: "chest-up framing"
  lens: "50mm equivalent" # 'wide', 'standard', 'telephoto' or mm equivalent.

# Background description.
background:
  description: "plain, neutral light-gray studio background, out of focus"
  color: "#e0e0e0"

# Default resolution for this scene.
resolution:
  width: 512
  height: 512
