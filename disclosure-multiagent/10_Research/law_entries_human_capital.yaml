  # ─────────────────────────────────────────────────────────
  # [HC_20220830_001]
  # 内閣官房「人的資本可視化指針」公表
  # ─────────────────────────────────────────────────────────
  - id: HC_20220830_001
    title: 人的資本可視化指針の公表（内閣官房）
    law_name: 人的資本可視化指針（内閣官房 非財務情報可視化研究会）
    category: 人的資本ガイダンス
    change_type: 参考
    effective_from: 2022-08-30
    applicable_from_note: >
      指針公表日。法的義務ではなく任意ガイダンス。
      2023年3月期以降の有報開示において事実上の参照資料として活用推奨。
    target_companies: 有価証券報告書提出会社（任意適用。上場企業を主な対象として想定）
    summary: >
      内閣官房非財務情報可視化研究会が人的資本の開示に関する国内初の包括的指針を公表。
      7つの視点・19の開示項目フレームワークを示し、有報やIR資料への活用を促した。
    disclosure_items:
      - "7視点: 人材育成/エンゲージメント/流動性/多様性・包摂/健康・安全/労働慣行/コンプライアンス・倫理"
      - "19項目: 各視点に紐づく具体的開示項目（詳細は指針PDF参照）"
      - "ISO 30414・GRI・SASBとの対応表を付録に掲載"
    source: https://www.cas.go.jp/jp/houdou/pdf/20220830shiryou1.pdf
    source_confirmed: true
    see_also: [HC_20230131_001]
    notes: >
      法的義務ではないが、金融庁の2023年開示府令改正の実務ガイドとして機能している。
      有報開示の要件確認時は本指針を参照することが実務慣行。

  # ─────────────────────────────────────────────────────────
  # [HC_20230131_001]
  # 企業内容等の開示に関する内閣府令改正（人的資本・多様性の義務化）
  # ─────────────────────────────────────────────────────────
  - id: HC_20230131_001
    title: 企業内容等の開示に関する内閣府令改正（人的資本・多様性開示の義務化）
    law_name: 企業内容等の開示に関する内閣府令等の一部を改正する内閣府令（令和5年内閣府令第3号）
    category: 金商法・開示府令
    change_type: 追加必須
    effective_from: 2023-01-31
    applicable_from_note: >
      2023年3月31日以後に終了する事業年度に係る有価証券報告書から適用。
      多くの上場企業では2023年3月期有報（2023年6〜7月提出）が初回適用。
    target_companies: >
      金融商品取引法第24条に基づく有価証券報告書提出会社（上場企業等、約4,000社）。
      連結・単体の両方で開示が求められる指標あり。
    summary: >
      有価証券報告書に「サステナビリティ情報欄」が新設され、人的資本・多様性に関する記載が
      義務化された。人材育成方針・社内環境整備方針・女性管理職比率等の開示が必須となった。
    disclosure_items:
      - "サステナビリティ情報欄の新設（様式第19号 第二部第2「事業の状況」内）"
      - "人材育成方針の記載（必須）"
      - "社内環境整備方針の記載（必須）"
      - "女性管理職比率（連結・単体）の開示（必須）"
      - "男性育児休業取得率の開示（必須、労働者数300人超の企業）"
      - "男女間賃金格差の開示（必須）"
      - "指標・目標: 人材戦略と関連付けた場合は選択的に開示"
    source: https://www.fsa.go.jp/news/r4/sonota/20230131/20230131.html
    source_confirmed: false
    see_also: [HC_20220830_001, HC_20260220_001]
    notes: >
      source URLは金融庁報道発表ページ（推定）。実装前にWebFetchで本文・交付日を確認すること。
      男性育児休業取得率の開示義務は育児・介護休業法改正（2022年4月施行）との連携で変動あり。

  # ─────────────────────────────────────────────────────────
  # [HC_20230331_001]
  # 有価証券報告書 人的資本開示 初回適用（2023年3月期）
  # ─────────────────────────────────────────────────────────
  - id: HC_20230331_001
    title: 人的資本・多様性開示義務化 初回適用事業年度（2023年3月期）
    law_name: 企業内容等の開示に関する内閣府令（令和5年内閣府令第3号 適用開始）
    category: 金商法・開示府令
    change_type: 追加必須
    effective_from: 2023-03-31
    applicable_from_note: >
      2023年3月31日以後終了の事業年度から適用開始。
      3月決算企業は2023年3月期（2023年6〜7月提出の有報）が初回。
    target_companies: 有価証券報告書提出会社（約4,000社）
    summary: >
      HC_20230131_001の実際の適用開始基準日。
      3月決算の上場企業において人的資本・多様性の法定開示が事実上スタートした節目。
      ギャップ分析では「2023年3月期以前/以後」でフレームを切る際の基準日として使用する。
    source: https://www.fsa.go.jp/news/r4/sonota/20230131/20230131.html
    source_confirmed: false
    see_also: [HC_20230131_001]
    notes: >
      法令施行日（2023-01-31）とは別に、「有報への初回適用基準日」として独立エントリ化した。
      ギャップ分析エージェントが「この企業の有報は何年3月期か」で適用要件を判定する際に参照する。

  # ─────────────────────────────────────────────────────────
  # [HC_20250421_001]
  # 金融庁 人的資本開示の好事例集（2025年4月）
  # ─────────────────────────────────────────────────────────
  - id: HC_20250421_001
    title: 金融庁「人的資本の開示等に関するWG」好事例集（2025年）
    law_name: 金融庁 サステナビリティ情報の開示と保証に係るWG資料（2025年4月21日公表）
    category: 人的資本ガイダンス
    change_type: 修正推奨
    effective_from: 2025-04-21
    applicable_from_note: >
      公表日（2025年4月21日）以降の有報作成時から参考にすることが推奨される。
      法的義務ではないが、2025年3月期有報作成に向けた実務ガイドとして機能。
    target_companies: 有価証券報告書提出会社（特に人的資本開示の充実を検討する上場企業）
    summary: >
      金融庁WGが2024年3月期有報を分析し、人的資本開示の好事例を整理した資料。
      人材戦略と経営戦略の連動、KPI設定、指標の定義明確化等のベストプラクティスを示した。
    disclosure_items:
      - "人材戦略と経営戦略の連動（具体例付き）"
      - "定量的KPI・目標値の設定例"
      - "ガバナンス体制の開示例（人的資本委員会等）"
      - "リスク・機会の開示例"
    source: https://www.fsa.go.jp/singi/singi_kinyu/sustainability_disclose_wg/shiryou/20250421/01.pdf
    source_confirmed: true
    notes: >
      好事例集は法的拘束力なし。松竹梅提案エージェントの「松」レベルのfew-shot例として活用可能。

  # ─────────────────────────────────────────────────────────
  # [HC_20260220_001]
  # 開示府令改正（2026年2月）: 企業戦略と人材戦略の連携・給与開示義務化
  # ─────────────────────────────────────────────────────────
  - id: HC_20260220_001
    title: 企業内容等の開示に関する内閣府令改正（人的資本開示拡充・給与開示）
    law_name: 企業内容等の開示に関する内閣府令（令和8年改正・2026年2月20日施行）
    category: 金商法・開示府令
    change_type: 追加必須
    effective_from: 2026-02-20
    applicable_from_note: >
      2026年3月31日以後に終了する事業年度に係る有価証券報告書から適用。
      3月決算企業は2026年3月期有報（2026年6〜7月提出）が初回適用。
    target_companies: >
      有価証券報告書提出会社（約4,000社）。
      SSBJ義務化（時価総額1兆円以上）とは別枠での義務化。
    summary: >
      2026年2月20日に内閣府令改正が施行され、人的資本開示が拡充された。
      企業戦略と関連付けた人材戦略の明示、従業員給与決定方針、平均年間給与の対前年増減率の
      開示が新たに義務化された。2026年3月期有報から適用。
    disclosure_items:
      - "企業戦略と関連付けた人材戦略の記載（必須）: 経営戦略との連動を明示すること"
      - "従業員給与等の決定に関する方針の記載（必須）: 賃上げに関する方針を含む"
      - "平均年間給与の対前事業年度増減率の記載（必須）: 連結・単体両方で開示"
    source: https://sustainablejapan.jp/2026/02/23/fsa-ssbj-4/122214
    source_confirmed: true
    see_also: [HC_20230131_001, SSBJ_20260220_001]
    notes: >
      同一の府令改正でSSBJ基準義務化も行われた（→ SSBJ_20260220_001 参照）。
      人的資本の3項目追加はSSBJ義務化対象（時価総額1兆円以上）とは別に、
      全有報提出会社（約4,000社）が対象となる点に注意。

  # ─────────────────────────────────────────────────────────
  # [HC_20251126_001]
  # 開示府令改正案 パブリックコメント（2025年11月）
  # ─────────────────────────────────────────────────────────
  - id: HC_20251126_001
    title: 企業内容等の開示に関する内閣府令改正案のパブリックコメント（2025年11月）
    law_name: 「企業内容等の開示に関する内閣府令の一部を改正する内閣府令」（案）パブリックコメント
    category: 金商法・開示府令
    change_type: 参考
    effective_from: 2025-11-26
    applicable_from_note: >
      パブリックコメント受付開始日。正式施行は2026年2月20日（HC_20260220_001）。
      2026年3月期有報への適用を検討する際の予告情報として参照。
    target_companies: 有価証券報告書提出会社
    summary: >
      2026年2月施行の開示府令改正案（人的資本開示拡充・SSBJ義務化）に対する
      パブリックコメント手続。改正の予告情報として、早期の実務準備を促す段階の情報。
    source: https://www.fsa.go.jp/news/r7/shouken/20251126/20251126.html
    source_confirmed: true
    see_also: [HC_20260220_001]
    notes: >
      改正の正式施行はHC_20260220_001。本エントリは「改正の予告段階」の記録。
      ギャップ分析では HC_20260220_001 を適用対象として使用すること。

  # ─────────────────────────────────────────────────────────
  # [HC_20251200_001]
  # 人的資本可視化指針の見直し（2025年12月）
  # ─────────────────────────────────────────────────────────
  - id: HC_20251200_001
    title: 人的資本可視化指針の見直し（内閣官房・金融庁・経済産業省）
    law_name: 人的資本可視化指針の見直しについて（内閣官房・金融庁・経済産業省 合同公表、2025年12月）
    category: 人的資本ガイダンス
    change_type: 修正推奨
    effective_from: 2025-12-01
    applicable_from_note: >
      公表月（2025年12月）以降の開示準備から参考にすることが推奨される。
      法的義務ではない。2022年8月指針（HC_20220830_001）の改訂版。
    target_companies: 有価証券報告書提出会社（上場企業を主な対象として想定）
    summary: >
      2022年8月の人的資本可視化指針を、その後の開示義務化・SSBJ基準等の動向を踏まえて
      内閣官房・金融庁・経済産業省が合同で見直した改訂版指針。
      企業戦略との連動・定量的指標の設定・投資対効果の可視化を強調。
    source: https://www.cas.go.jp/jp/seisaku/nipponseichosenryaku/hizaimu/dai7/siryou2.pdf
    source_confirmed: true
    see_also: [HC_20220830_001, HC_20260220_001]
    notes: >
      2022年版指針（7視点19項目）からの主な変更点を確認し、
      ギャップ分析の参照フレームを更新すること。具体的な変更点は本PDFを参照。
