services:
  backend:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: disclosure-backend
    ports:
      - "8010:8010"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - EDINET_SUBSCRIPTION_KEY=${EDINET_SUBSCRIPTION_KEY:-}
    volumes:
      - ./api/data:/app/api/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: disclosure-web
    ports:
      - "3010:3010"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8010
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3010"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
