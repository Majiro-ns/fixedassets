# disclosure-multiagent — 法令・ガイダンス情報 YAML
# カテゴリ: 銀行業特化（バーゼルIII開示 / 不良債権引当）
# 対象期間: 2025年度（2025-04-01〜2026-03-31）
# スキーマ定義: docs/law_yaml_schema.md
# 作成者: Majiro-ns
#
# 根拠法令:
#   バーゼルIII第3の柱（市場規律）: 金融庁告示・監督指針
#   金融再生法（金融機能の再生のための緊急措置に関する法律）
#   銀行法施行規則 第19条の2（業務及び財産の状況に関する説明書類）
#   主要行等向けの総合的な監督指針（金融庁 2025年改訂版）

version: "1.0"
effective_period:
  from: "2025-04-01"
  to: "2026-03-31"

amendments:

  # ──────────────────────────────────────────
  # 【第1群】バーゼルIII 第3の柱（自己資本・流動性・レバレッジ）
  # ──────────────────────────────────────────

  - id: "bk-2025-001"
    category: "銀行業（バーゼルIII）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "バーゼルIII第3の柱 — 自己資本比率の開示（CET1 / Tier1 / 総自己資本）"
    source: "https://www.fsa.go.jp/news/r5/ginkou/20231020/01.pdf"
    source_confirmed: true
    summary: >
      バーゼルIII第3の柱（市場規律）に基づく自己資本比率の開示要件。
      普通株式等Tier1比率（CET1比率）・Tier1比率・総自己資本比率の各数値を
      連結・単体ベースで開示する。規制上の最低水準（CET1 4.5%、Tier1 6%、
      総自己資本 8%）との対比、資本バッファー（資本保全バッファー2.5%）の
      充足状況も含めて記載することが求められる。
    target_sections:
      - "リスク管理の状況"
      - "自己資本の充実の状況"
      - "財務上の主要な指標"
    required_items:
      - "CET1比率（普通株式等Tier1比率）の連結・単体数値"
      - "Tier1比率の連結・単体数値"
      - "総自己資本比率の連結・単体数値"
      - "規制上の最低水準との比較（バッファー充足状況）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "地方銀行・信用金庫等の内部格付け手法適用行は開示様式が異なる場合がある"

  - id: "bk-2025-002"
    category: "銀行業（バーゼルIII）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "バーゼルIII第3の柱 — リスク加重資産（RWA）内訳の開示"
    source: "https://www.fsa.go.jp/news/r5/ginkou/20231020/01.pdf"
    source_confirmed: true
    summary: >
      バーゼルIII第3の柱に基づくリスク加重資産（RWA）の内訳開示要件。
      信用リスク・市場リスク・オペレーショナルリスクの各RWA及び
      算出方法（標準的手法 / 内部格付け手法）を開示する。
      前期比較表を含め、RWAの変動要因（新規融資・格付け変化・
      手法変更等）についても説明が求められる。
    target_sections:
      - "リスク管理の状況"
      - "自己資本の充実の状況"
    required_items:
      - "信用リスクRWAの金額および算出方法"
      - "市場リスクRWAの金額および算出方法"
      - "オペレーショナルリスクRWAの金額および算出方法"
      - "RWA前期比較および主な変動要因の説明"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "内部格付け手法採用行はOVA・OV1テンプレートに基づく開示が必要"

  - id: "bk-2025-003"
    category: "銀行業（バーゼルIII）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "バーゼルIII — 流動性カバレッジ比率（LCR）の開示"
    source: "https://www.fsa.go.jp/news/r4/ginkou/20221202.html"
    source_confirmed: true
    summary: >
      バーゼルIII流動性規制に基づく流動性カバレッジ比率（LCR）の開示要件。
      ストレス時の30日間の純キャッシュアウトフローを高品質流動資産（HQLA）で
      カバーできるかを示す指標。規制上の最低水準（100%）と比較した
      自行の充足状況、及びLCRの構成要素（HQLA・キャッシュフロー）の
      内訳を四半期平均値で開示することが求められる。
    target_sections:
      - "リスク管理の状況"
      - "流動性リスク管理"
    required_items:
      - "LCR（流動性カバレッジ比率）の四半期平均値"
      - "高品質流動資産（HQLA）の残高内訳"
      - "純キャッシュアウトフローの算出根拠"
      - "LCR規制最低水準（100%）との対比"
    applicable_markets:
      - "プライム"
    notes: "国際統一基準行（国際業務を行う主要行）が主な開示対象"

  - id: "bk-2025-004"
    category: "銀行業（バーゼルIII）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "バーゼルIII — 安定調達比率（NSFR）の開示"
    source: "https://www.fsa.go.jp/news/r4/ginkou/20221202.html"
    source_confirmed: true
    summary: >
      バーゼルIII流動性規制に基づく安定調達比率（NSFR）の開示要件。
      1年超の調達安定性を評価する指標で、利用可能な安定資金調達額（ASF）を
      所要安定資金調達額（RSF）で除した比率（規制最低水準100%）。
      調達手段の構成（預金・債券・インターバンク等）と資産別の
      流動性分類についても開示が求められる。
    target_sections:
      - "リスク管理の状況"
      - "流動性リスク管理"
    required_items:
      - "NSFR（安定調達比率）の数値"
      - "利用可能な安定資金調達額（ASF）の内訳"
      - "所要安定資金調達額（RSF）の内訳"
      - "NSFR規制最低水準（100%）との対比"
    applicable_markets:
      - "プライム"
    notes: "2021年3月末より規制適用開始（国際統一基準行）"

  - id: "bk-2025-005"
    category: "銀行業（バーゼルIII）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "バーゼルIII — レバレッジ比率の開示"
    source: "https://www.fsa.go.jp/news/r5/ginkou/20231020/01.pdf"
    source_confirmed: true
    summary: >
      バーゼルIII補完指標としてのレバレッジ比率（Tier1資本 / エクスポージャー合計）の
      開示要件。規制上の最低水準（3%）との比較及び
      エクスポージャーの内訳（オンバランス資産・デリバティブ・SFT・
      オフバランス項目）を記載する。過度なレバレッジ蓄積を
      防止する観点から、四半期末時点での開示が求められる。
    target_sections:
      - "リスク管理の状況"
      - "自己資本の充実の状況"
    required_items:
      - "レバレッジ比率の数値（Tier1資本/エクスポージャー合計）"
      - "エクスポージャー合計の内訳"
      - "レバレッジ比率規制最低水準（3%）との対比"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "2023年3月末より国内基準行にも適用拡大"

  # ──────────────────────────────────────────
  # 【第2群】不良債権・貸倒引当金（金融再生法ベース）
  # ──────────────────────────────────────────

  - id: "bk-2025-006"
    category: "銀行業（不良債権）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "金融再生法 — 不良債権残高・分類（破綻先/実質破綻先/破綻懸念先/要管理先）の開示"
    source: "https://www.fsa.go.jp/news/r5/ginkou/20230929/01.pdf"
    source_confirmed: true
    summary: >
      金融機能の再生のための緊急措置に関する法律（金融再生法）に基づく
      不良債権残高の開示要件。与信先の資産分類を
      「破綻先」「実質破綻先」「破綻懸念先」「要管理先」の4区分で開示する。
      各区分の融資残高、担保・保証による保全額、未保全残高を明示し、
      前期比較による不良債権比率（対総与信）の推移も記載することが求められる。
    target_sections:
      - "リスク管理の状況"
      - "信用リスク管理"
      - "不良債権の状況"
    required_items:
      - "破綻先債権残高"
      - "実質破綻先債権残高"
      - "破綻懸念先債権残高"
      - "要管理先（要注意先のうち3ヶ月以上延滞・条件緩和）債権残高"
      - "不良債権比率（対総与信）の前期比較"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "地域銀行・信用金庫は銀行法施行規則に基づく開示に準じる"

  - id: "bk-2025-007"
    category: "銀行業（不良債権）"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "貸倒引当金の計上方針（個別貸倒引当金・一般貸倒引当金）の開示"
    source: "https://www.fsa.go.jp/news/r5/ginkou/20230929/01.pdf"
    source_confirmed: true
    summary: >
      貸倒引当金の計上根拠・算定方法の開示要件。
      「個別貸倒引当金」（要管理先以下の個別与信先に設定）と
      「一般貸倒引当金」（正常先・要注意先に対し過去の損失実績率ベースで計上）の
      区分で、計上額・算出方法・引当率を開示する。
      IFRS9（予想信用損失モデル）採用行は3ステージ方式の概要も記載する。
    target_sections:
      - "重要な会計方針"
      - "貸倒引当金"
      - "信用リスク管理"
    required_items:
      - "個別貸倒引当金の計上方針および計上額"
      - "一般貸倒引当金の計上方針・算定方法（損失実績率等）および計上額"
      - "引当率の根拠（直近の損失実績・マクロ経済見通し等）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "IFRS採用行はIFRS9 ECL（予想信用損失）3ステージ方式の説明も必要"

  # ──────────────────────────────────────────
  # 【第3群】信用リスク・金利リスク・ストレステスト
  # ──────────────────────────────────────────

  - id: "bk-2025-008"
    category: "銀行業（信用リスク）"
    change_type: "修正推奨"
    effective_from: "2025-04-01"
    title: "信用リスク管理体制の開示（融資審査・モニタリング・集中リスク）"
    source: "https://www.fsa.go.jp/news/r5/ginkou/20231020/01.pdf"
    source_confirmed: true
    summary: >
      銀行の信用リスク管理体制に関する開示要件。
      融資審査プロセス（審査基準・承認権限・格付け体系）、与信先のモニタリング
      頻度・方法、業種・地域・グループ与信集中リスクの管理方針を記載する。
      大口与信先への集中リスク（自己資本比率の一定割合超の与信先）の
      管理実態も含めることが望ましい。
    target_sections:
      - "信用リスク管理"
      - "リスク管理の状況"
    required_items:
      - "融資審査プロセスの概要（格付け体系・承認権限）"
      - "与信先モニタリングの方法・頻度"
      - "業種別・地域別与信集中リスクの管理方針"
      - "大口与信先（自己資本10%超）の管理状況"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "主要行等向けの総合的な監督指針 III-3-1（信用リスク管理）に対応"

  - id: "bk-2025-009"
    category: "銀行業（金利リスク）"
    change_type: "修正推奨"
    effective_from: "2025-04-01"
    title: "金利リスク（IRRBB）管理の開示"
    source: "https://www.fsa.go.jp/news/r5/ginkou/20231020/01.pdf"
    source_confirmed: true
    summary: >
      銀行勘定の金利リスク（IRRBB: Interest Rate Risk in the Banking Book）の
      開示要件。金利変動シナリオ（パラレルシフト・スティープニング・
      フラットニング等）を用いたEaR（収益への影響額）または
      EVE（経済価値への影響額）の試算結果を開示する。
      外国金利リスク、コア預金モデルの前提条件についても説明が求められる。
    target_sections:
      - "市場リスク管理"
      - "リスク管理の状況"
      - "金利リスク"
    required_items:
      - "金利変動シナリオによるEVE（経済価値）への影響額"
      - "金利変動シナリオによるNII（純金利収益）への影響額"
      - "コア預金モデルの主要前提条件"
      - "IRRBB管理の組織・プロセスの概要"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "バーゼルIII IRRBB基準（2016年）国内実施 — 2020年3月末施行"

  - id: "bk-2025-010"
    category: "銀行業（ストレステスト）"
    change_type: "修正推奨"
    effective_from: "2025-04-01"
    title: "ストレステスト・シナリオ分析の実施状況の開示"
    source: "https://www.fsa.go.jp/news/r5/ginkou/20231020/01.pdf"
    source_confirmed: true
    summary: >
      銀行の健全性を評価するストレステスト・シナリオ分析の実施概要の開示要件。
      感度分析（個別リスクファクターの変動）とシナリオ分析（複合的なリスクシナリオ）
      の両面から、自己資本比率・流動性・収益性への影響を定量的に示す。
      マクロ経済変動（景気後退・金利急騰・不動産市場下落等）の
      ストレスシナリオ設定根拠も説明することが望ましい。
    target_sections:
      - "リスク管理の状況"
      - "統合リスク管理"
    required_items:
      - "ストレステストの実施頻度・シナリオ設定の概要"
      - "マクロ経済ストレスシナリオにおける自己資本比率への影響試算"
      - "流動性ストレスシナリオにおける資金繰り耐性の評価結果"
    applicable_markets:
      - "プライム"
    notes: "主要行等向けの総合的な監督指針 III-3-7（ストレステスト）に対応"
