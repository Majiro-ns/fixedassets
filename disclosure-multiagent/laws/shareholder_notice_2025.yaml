      - "サステナビリティ連動報酬"
    required_items:
      - "サステナビリティ連動KPIの一覧（指標名・目標値・重み付け）"
      - "当年度のKPI達成状況・評価結果"
      - "連動報酬額の算定根拠"
    applicable_markets:
      - "プライム"
    notes: "義務ではないが、プライム機関投資家の議決権行使方針に影響する開示項目"
