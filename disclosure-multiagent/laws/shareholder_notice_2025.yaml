# disclosure-multiagent — 法令・ガイダンス情報 YAML
# カテゴリ: 総会前開示・ガバナンス（株主総会招集通知対応）
# 対象期間: 2025年度（2025-04-01〜2026-03-31）
# スキーマ定義: docs/law_yaml_schema.md
#
# CHECK-7b 手確認メモ:
#   会社法改正（電子提供制度）: 2023年9月1日施行
#   CGコード再改訂: 2021年6月11日施行（プライム上場企業のスキルマトリックス開示等）
#   経産省「CGS研究会」報告書: 2022年7月改訂
#   東証「コーポレートガバナンス・コード」: 2021年6月版が現行基準
#   招集通知の電子提供制度: 改正会社法第325条の2〜325条の7

version: "1.0"
effective_period:
  from: "2025-04-01"
  to: "2026-03-31"

amendments:

  # ──────────────────────────────────────────
  # 総会前開示カテゴリ（gm）— 招集通知基本要件（12件）
  # ──────────────────────────────────────────

  - id: "gm-2025-001"
    category: "総会前開示"
    change_type: "追加必須"
    effective_from: "2023-09-01"
    title: "電子提供制度の導入 — 招集通知の電子提供義務（改正会社法 第325条の2）"
    source: "https://www.moj.go.jp/MINJI/minji07_00297.html"
    summary: >
      改正会社法（2023年9月1日施行）により、上場企業は株主総会招集通知の添付書類を
      ウェブサイトに掲載（電子提供）しなければならない（電子提供制度）。
      招集通知の発送に代えて、電子提供措置をとることが可能になった。
      電子提供措置は総会の3週間前までに開始し、総会後3か月間維持する必要がある。
    target_sections:
      - "招集通知発送方法"
      - "電子提供措置"
      - "株主総会参考書類"
    required_items:
      - "電子提供措置開始日（総会3週間前）"
      - "ウェブサイトURL（会社法所定事項の掲載先）"
      - "書面交付請求への対応方針"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "2023年9月1日以降に開催の総会から義務化。書面請求株主への書面交付義務も継続"

  - id: "gm-2025-002"
    category: "総会前開示"
    change_type: "追加必須"
    effective_from: "2023-09-01"
    title: "招集通知の発送期限 — 総会3週間前（改正会社法 第299条）"
    source: "https://www.moj.go.jp/MINJI/minji07_00297.html"
    summary: >
      会社法第299条により、上場企業の株主総会招集通知は総会の日の2週間前（書面・電磁的）
      または3週間前（電子提供措置）までに発送または措置をとる必要がある。
      電子提供制度採用企業は3週間前起算が義務となる。
      CGコード補充原則1-2④では「少なくとも3週間前（可能な限り4週間前）」の早期発送を推奨。
    target_sections:
      - "招集通知発送日"
    required_items:
      - "招集通知発送日または電子提供措置開始日の記載"
      - "総会開催日との差（3週間以上）の確認"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "プライムは4週間前発送がCGコードで強く推奨（補充原則1-2④）"

  - id: "gm-2025-003"
    category: "総会前開示"
    change_type: "修正推奨"
    effective_from: "2021-06-11"
    title: "招集通知の早期開示（任意開示） — CGコード補充原則1-2④"
    source: "https://www.jpx.co.jp/news/1020/20210611-01.html"
    summary: >
      東証CGコード（2021年版）補充原則1-2④は、上場企業に対して招集通知関連書類を
      総会に十分先立って（少なくとも3週間前、可能であれば4週間前以上）提供することを推奨。
      また、英語版の招集通知・議決権行使書類の提供（プライム上場企業）も推奨。
      TDnet・自社ウェブサイト等での事前公開が一般的。
    target_sections:
      - "招集通知公開先"
      - "株主総会参考書類"
    required_items:
      - "TDnetまたは自社ウェブサイトへの招集通知掲載（早期開示）"
      - "英語版招集通知の提供（プライム企業）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "義務ではないが、プライム企業への機関投資家の要求は高まっている"

  - id: "gm-2025-004"
    category: "総会前開示"
    change_type: "修正推奨"
    effective_from: "2021-06-11"
    title: "議決権電子行使プラットフォームへの参加 — CGコード補充原則1-2④"
    source: "https://www.jpx.co.jp/news/1020/20210611-01.html"
    summary: >
      CGコード補充原則1-2④は、プライム上場企業に対して議決権電子行使プラットフォームへの
      参加（ICJの機関投資家向けプラットフォーム等）を推奨。
      海外機関投資家の議決権行使参加率向上が目的。
      招集通知においてプラットフォームの利用案内を記載することが推奨される。
    target_sections:
      - "議決権行使方法"
    required_items:
      - "電子行使プラットフォーム利用の案内（参加企業の場合）"
      - "インターネット議決権行使の方法説明"
    applicable_markets:
      - "プライム"
    notes: "スタンダード・グロースは任意。プライムでは機関投資家から実質要求されることが多い"

  - id: "gm-2025-005"
    category: "総会前開示"
    change_type: "追加必須"
    effective_from: "2021-06-11"
    title: "取締役選任議案の記載要件 — 候補者の資格・独立性等"
    source: "https://www.jpx.co.jp/news/1020/20210611-01.html"
    summary: >
      株主総会参考書類（招集通知添付）の取締役選任議案には、候補者の氏名・略歴・
      重要な兼職・当社との利害関係に加え、選任理由を記載する必要がある（会社法施行規則第74条）。
      CGコードでは、スキルマトリックスとの対応付け、取締役会全体の構成方針との整合性説明を推奨。
      社外取締役候補者については、独立性判断基準・独立役員届出先も記載が必要。
    target_sections:
      - "議案（取締役選任の件）"
      - "株主総会参考書類"
    required_items:
      - "候補者氏名・生年月日・略歴"
      - "重要な兼職の状況"
      - "選任理由（スキルとの対応含む）"
      - "当社との利害関係"
      - "社外取締役の場合: 独立役員指定の有無と独立性根拠"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "会社法施行規則第74条・74条の3が根拠。参考書類の記載形式は法定様式"

  - id: "gm-2025-006"
    category: "総会前開示"
    change_type: "追加必須"
    effective_from: "2021-06-11"
    title: "社外取締役の独立性基準の開示 — 会社法施行規則・CGコード対応"
    source: "https://www.jpx.co.jp/news/1020/20210611-01.html"
    summary: >
      社外取締役候補者を招集通知に記載する際、会社が定める独立性判断基準を明示し、
      各候補者がその基準を充足していることを示す必要がある。
      東証有価証券上場規程第436条の2により、独立役員の指定・届出が上場企業に義務付けられており、
      招集通知においても独立性の根拠を株主に説明することが求められる。
      CGコードでは独立性基準の制定・開示を原則4-9として要求。
    target_sections:
      - "議案（取締役選任の件）"
      - "社外役員に関する事項"
    required_items:
      - "会社が定める独立性判断基準の開示"
      - "各社外取締役候補者の独立性充足理由"
      - "独立役員届出先（東証）との対応確認"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "東証独立役員届出制度と整合させること。上場規程第436条の2準拠"

  - id: "gm-2025-007"
    category: "総会前開示"
    change_type: "追加必須"
    effective_from: "2021-06-11"
    title: "役員報酬改定議案の記載要件 — 報酬額・算定方法の開示"
    source: "https://www.fsa.go.jp/news/r4/sonota/20221114-3/20221114-3.html"
    summary: >
      役員報酬の決定または変更に関する議案を株主総会に付議する場合、
      株主総会参考書類に報酬の額・算定方法・その相当性の判断根拠を記載する必要がある。
      2024年3月期以降の有報改革により、有報での個人別報酬開示（1億円以上）も連動。
      招集通知では報酬体系の概要・変更理由・報酬委員会等の関与状況を説明することが推奨。
    target_sections:
      - "議案（役員報酬改定の件）"
      - "役員の報酬等"
    required_items:
      - "報酬限度額または個別報酬額・算定基準"
      - "変更理由・相当性の根拠"
      - "報酬委員会（指名委員会等設置会社の場合）または任意委員会の関与"
      - "業績連動報酬の指標・算定方法"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "会社法施行規則第82条・82条の2が根拠。サステナビリティ連動報酬KPI設定も増加"

  - id: "gm-2025-008"
    category: "総会前開示"
    change_type: "追加必須"
    effective_from: "2021-06-11"
    title: "監査役選任議案の記載要件 — 候補者の財務・会計知識等"
    source: "https://www.fsa.go.jp/news/r4/sonota/20221114-3/20221114-3.html"
    summary: >
      監査役選任議案の株主総会参考書類には、候補者の氏名・略歴・当社との利害関係に加え、
      財務・会計に関する知識・経験（財務専門家としての資格等）を記載することが推奨される。
      社外監査役候補者については独立性の根拠・監査役会の同意の有無も記載が必要。
      常勤監査役の有無・委員会型との違いも明確化すること。
    target_sections:
      - "議案（監査役選任の件）"
    required_items:
      - "候補者氏名・略歴・重要な兼職"
      - "財務・会計知識の有無と根拠"
      - "選任理由"
      - "社外監査役の場合: 独立性根拠・監査役会の同意"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "会社法施行規則第76条・76条の2が根拠。監査等委員会設置会社は別規則"

  - id: "gm-2025-009"
    category: "総会前開示"
    change_type: "追加必須"
    effective_from: "2025-04-01"
    title: "定款変更議案の記載要件 — 変更理由・新旧対照表"
    source: "https://www.moj.go.jp/MINJI/minji07_00297.html"
    summary: >
      定款変更議案を株主総会に付議する場合、株主総会参考書類に変更の目的・理由・
      変更後の定款条文を記載する必要がある（会社法施行規則第85条）。
      実務上は新旧対照表形式での記載が一般的。
      電子提供制度採用企業では、定款変更関連資料もウェブサイト上での提供が可能。
    target_sections:
      - "議案（定款変更の件）"
    required_items:
      - "変更の目的・理由"
      - "変更箇所の新旧対照表（現行条文→改正条文）"
      - "変更後の効力発生時期"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "会社法施行規則第85条が根拠。事業目的の変更は特に詳細な説明が必要"

  - id: "gm-2025-010"
    category: "総会前開示"
    change_type: "修正推奨"
    effective_from: "2021-06-11"
    title: "株主提案への対応記載 — CGコード原則1-1③対応"
    source: "https://www.jpx.co.jp/news/1020/20210611-01.html"
    summary: >
      株主提案権が行使された場合、招集通知（株主総会参考書類）に株主提案議案を
      会社提案と同等の形式で記載する義務がある（会社法第305条）。
      CGコード原則1-1③では、株主の権利行使を実質的に確保するための環境整備を要求。
      取締役会の反対意見がある場合もその理由を明示することが求められる。
    target_sections:
      - "株主提案議案"
    required_items:
      - "株主提案議案の全文記載（株主提案があった場合）"
      - "取締役会の意見（賛否・理由）"
      - "株主提案者の意見要旨（上限500字程度）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "会社法第304条・305条が根拠。株主提案の乱用防止策（上限数10件）も2021年改正で導入"

  - id: "gm-2025-011"
    category: "総会前開示"
    change_type: "修正推奨"
    effective_from: "2021-06-11"
    title: "議決権行使結果の開示 — 総会後速報・TDNET開示"
    source: "https://www.jpx.co.jp/news/1020/20210611-01.html"
    summary: >
      CGコード補充原則1-2②では、株主総会後に議決権行使結果（議案別の賛否票数）を
      速やかに開示することを推奨。東証上場規程第415条により、議決権行使結果は
      適時開示事項（TDnet）として総会終了後に開示が必要。
      各議案の賛成・反対・棄権の票数と比率を記載する。
    target_sections:
      - "議決権行使結果"
    required_items:
      - "議案別の賛成・反対・棄権の票数"
      - "議案別の賛成比率（%）"
      - "承認・否決の結果"
    applicable_markets:
      - "プライム"
      - "スタンダード"
      - "グロース"
    notes: "総会終了当日〜翌営業日中のTDnet開示が標準。招集通知本体ではなく総会後の開示"

  - id: "gm-2025-012"
    category: "総会前開示"
    change_type: "修正推奨"
    effective_from: "2024-04-01"
    title: "役員個別報酬の開示 — 招集通知への記載推奨（1億円以上）"
    source: "https://www.fsa.go.jp/news/r4/sonota/20221114-3/20221114-3.html"
    summary: >
      有価証券報告書改革（2024年3月期から）により、1億円以上の報酬を受ける役員の
      個別報酬額が有報への開示義務となった。招集通知においても、報酬総額・役員区分別合計に加え、
      個別報酬（1億円以上の役員）を任意で開示する企業が増加。
      プライム上場企業では投資家への説明責任として、業績連動報酬のKPI達成状況も
      招集通知に記載することが推奨される。
    target_sections:
      - "役員の報酬等"
      - "業績連動報酬の算定結果"
    required_items:
      - "役員区分別の報酬総額（取締役・監査役・執行役員）"
      - "業績連動報酬の評価指標・達成状況（報酬改定議案がある場合）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "1億円以上の役員個別報酬は有報で必須。招集通知への個別開示は任意だが推奨水準"

  # ──────────────────────────────────────────
  # ガバナンスカテゴリ（gc）— CGコード対応要件（4件）
  # ──────────────────────────────────────────

  - id: "gc-2025-001"
    category: "ガバナンス"
    change_type: "追加必須"
    effective_from: "2021-06-11"
    title: "スキルマトリックス（取締役会スキル一覧）の招集通知への記載"
    source: "https://www.jpx.co.jp/news/1020/20210611-01.html"
    summary: >
      CGコード補充原則4-11①（2021年改訂）により、プライム上場企業は取締役会全体として
      必要なスキル・知見と、各取締役が備えるスキルの対応を示すスキルマトリックスの開示が義務化。
      招集通知の取締役選任議案または株主総会参考書類にスキルマトリックスを掲載することが
      一般的実務となっている。スキル項目は各社が設定（例: 経営/財務/法律/IT/サステナビリティ等）。
    target_sections:
      - "取締役選任議案"
      - "コーポレートガバナンスの状況"
    required_items:
      - "取締役会全体の構成方針（多様性・規模・任期）"
      - "各取締役候補者のスキル一覧（スキルマトリックス形式）"
      - "スキル項目の定義・選定理由"
    applicable_markets:
      - "プライム"
    notes: "スタンダード・グロースは任意だが開示率は上昇中。女性・外国人比率も合わせて開示"
    deprecated_from: null

  - id: "gc-2025-002"
    category: "ガバナンス"
    change_type: "修正推奨"
    effective_from: "2021-06-11"
    title: "取締役会評価の開示 — CGコード補充原則4-11③対応"
    source: "https://www.jpx.co.jp/news/1020/20210611-01.html"
    summary: >
      CGコード補充原則4-11③は、取締役会が毎年その機能・構成・運営等の実効性について
      分析・評価を行い、その結果の概要を招集通知または統合報告書・CGレポートで開示することを要求。
      外部機関による評価（第三者評価）の採用も増加。
      招集通知での開示は任意だが、プライム上場企業では実質標準化している。
    target_sections:
      - "コーポレートガバナンスの状況"
      - "取締役会実効性評価の結果"
    required_items:
      - "評価プロセスの概要（自己評価/第三者評価）"
      - "評価結果の概要（課題・改善取組）"
      - "前年の課題への対応状況"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "CGレポートとの重複を避けつつ、招集通知では要点のサマリー開示が効果的"

  - id: "gc-2025-003"
    category: "ガバナンス"
    change_type: "修正推奨"
    effective_from: "2021-06-11"
    title: "政策保有株式の保有方針・縮減状況の開示 — CGコード原則1-4対応"
    source: "https://www.jpx.co.jp/news/1020/20210611-01.html"
    summary: >
      CGコード原則1-4では、上場企業が政策保有株式を保有する場合に、
      保有方針（保有目的・保有合理性の検証方法）を開示し、毎年取締役会で
      保有の合理性を検証することを要求。招集通知では議決権行使基準・
      縮減状況・主要銘柄の保有理由を記載することが増加。
      プライム上場企業では政策保有比率の目標設定・開示が機関投資家から求められている。
    target_sections:
      - "政策保有株式"
      - "コーポレートガバナンスの状況"
    required_items:
      - "政策保有の基本方針"
      - "保有株式の議決権行使基準"
      - "縮減方針と実績（前年比較）"
    applicable_markets:
      - "プライム"
      - "スタンダード"
    notes: "CGコード原則1-4が根拠。有報での銘柄別開示（60銘柄）と整合させること"

  - id: "gc-2025-004"
    category: "ガバナンス"
    change_type: "修正推奨"
    effective_from: "2024-04-01"
    title: "サステナビリティ連動型役員報酬 — KPI設定・達成状況の開示"
    source: "https://www.fsa.go.jp/news/r4/sonota/20221114-3/20221114-3.html"
    summary: >
      プライム上場企業を中心に、役員報酬の一部にサステナビリティ指標（CO2削減・
      女性管理職比率・エンゲージメントスコア等）を連動させる企業が増加。
      招集通知の役員報酬議案において、サステナビリティKPIの設定根拠・
      評価方法・当年度の達成状況を開示することで、株主への説明責任を果たすことができる。
      2024年3月期有報からのサステナビリティ開示義務化（人的資本含む）と整合させた
      報酬体系の開示が機関投資家から強く求められている。
    target_sections:
