  rule_2:
    name: "厳選＋抑えセット原則"
    description: "主戦術（2点）に抑えを加えたセット購入がROI最大化"
    confidence: "MEDIUM"
    evidence: "主戦術のみ ROI 78.5% vs 複合 ROI 104%"
    implementation: "本命2点 ＋ 抑え1-2点の計3-4点セット"

  rule_3:
    name: "中穴レンジ維持原則"
    description: "10〜70倍の中穴帯で予想選択"
    confidence: "HIGH（事実）"
    implementation: "配当オッズ10〜70倍のレースを優先。1倍台・100倍超は非推奨"

  rule_4:
    name: "G1以上レース積極参加"
    description: "重賞でも予想あり。ただしイン有利の堅い予想に収束リスク"
    confidence: "MEDIUM（G1事例から）"
    caution: "G1での低配当リスク（唐津G1: 560円的中の事例）"

  rule_5:
    name: "選手能力評価記述スタイル"
    description: "「[選手名]の[能力評価]」形式で根拠を提示"
    confidence: "HIGH（コメント例から）"
    template: "{艇番}{選手名}の{能力評価}。{他艇番}{選手名}が{評価}。"

  rule_6:
    name: "夜間・時間帯限定強調スタイル"
    description: "記事タイトルで時間帯を明示（「16時以降」等）"
    confidence: "HIGH（記事タイトルパターンから）"
    implementation: "タイトルで対象時間帯を明示して読者の期待値を調整"

# ─────────────────────────────────────
# 11. 予想パイプラインへの推奨事項
# ─────────────────────────────────────
recommendations_for_pipeline:
  data_collection_priority:
    immediate:
      - "X（@kataru4649）の投稿テキストを手動収集（無料・ToS準拠）"
      - "第三者検証サイトの引用コメントをアーカイブ（上記ソース参照）"
    medium_term:
      - "note記事を数件購入（¥555/件）し、実際のテキストパターンを確認"
      - "record: 購入記事のコメント・買い目・結果を構造化JSON化"

  bet_strategy:
    recommended: "主戦術（2点） ＋ 抑え（1-2点）のセット購入"
    avoid: "主戦術のみの単独購入（ROI 78.5%で赤字）"
    bet_type: "3連単（カタルの主力）"

  filter_conditions:
    positive:
      - "タイトルに「狙える」「2点勝負」「資金配分あり」を含む記事"
      - "夜間（16時以降）対象のレース"
      - "中穴（10〜70倍）レンジのレース"
    negative:
      - "主戦術のみ（抑えなし）の記事"  # ROI 78.5%
      - "G1で1号艇圧倒的人気のレース"  # 低配当リスク

  confidence_filter:
    note: |
      Mr.Tと異なり、カタルの高確信表現（「厳選」「狙える」）は
      ROI 104%（複合）vs 78.5%（主戦術のみ）の差を示すが、
      「高確信=逆指標」の関係は未確認。
      → データ蓄積後に再評価必要。

  data_schema_for_future_collection:
    # 将来の有料記事購入時の収集スキーマ
    schema:
      forecaster: "カタル"
      platform: "note"
      article_url: "https://note.com/kataru4649/n/n[記事ID]"
      date: "YYYY-MM-DD"
      time_slot: "HH:MM以降"
      venue: "場名"
      race_number: "XR"
      grade: "一般/G3/G2/G1/SG"
      prediction_main: "3連単 X-Y-Z"
      prediction_sub: "3連単 A-B-C"
      reasoning: "予想根拠テキスト全文"
      result: "的中/不的中"
      payout: 0  # 円
      confidence_keywords: []

# ─────────────────────────────────────
# 12. データ品質・限界の整理
# ─────────────────────────────────────
data_limitations:
  primary_constraint: "全記事有料（¥444-555）のため生テキストデータへのアクセス不可"
  secondary_constraint: "note ToS（第17版）がスクレイピング・AI学習利用を明示禁止"

  available_data:
    - source: "note.comプロフィールページ（公開）"
      quality: "HIGH"
      content: "フォロワー数、記事数、価格、自己紹介文、記事タイトル（一部）"
    - source: "第三者検証レポート（複数サイト）"
      quality: "MEDIUM"
      content: "30戦検証成績、短期的中率、買い目パターン、コメント例（限定）"
    - source: "自己申告（note/X）"
      quality: "LOW（バイアスあり）"
      content: "予想スタイル、厳選方針、穴狙い条件"

  missing_data:
    - "実際の予想テキスト全文（有料）"
    - "競技場別・グレード別の定量成績"
    - "的中/不的中の紐付きデータ"
    - "モーター・水面評価の重み"
    - "具体的な「ずらし」条件"

  reliability_judgment: |
    本プロファイルはMr.Tの842件実データ分析と比較して信頼性が低い。
    定量値を記載した箇所も「推測」タグを付けており、
    有料記事購入後の再分析を強く推奨する。
    ただし、入手可能な情報から抽出した認知パターン（イン信頼、中穴志向、
    厳選2点スタイル）は、複数の独立ソースで一致しており、一定の信頼性がある。

