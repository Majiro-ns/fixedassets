# ─────────────────────────────────────
# 1. 基本統計（第三者検証データ統合）
# ─────────────────────────────────────
basic_stats:
  total_articles_on_note: 15064       # 事実（プロフィールページ直接確認）
  note_followers: 21462               # 事実（プロフィールページ直接確認）
  x_followers_approx: 17000           # 推測（複数レビュー記載から中央値）
  article_price_range: "¥444～¥555"   # 事実（プロフィールページ記事価格）
  free_articles: 0                    # 事実（全記事有料確認）
  posting_frequency: "毎日複数記事"   # 推測（15064件÷稼働期間から）

  # 30戦検証（2025/04/13〜05/12）← 最も信頼性が高い検証データ
  verified_30battles:
    source: "https://fukuoka-kyotei.com/column/kyoutei-kataru/"
    period: "2025-04-13 〜 2025-05-12"
    n: 30
    wins: 12
    losses: 18
    hit_rate: 0.400
    recovery_rate: 1.040
    total_investment: 90000
    total_payout: 94000
    net_profit: 4000
    data_quality: "HIGH（外部検証者による独立観測）"

  # 複数検証統合推定（加重平均・信頼区間）
  aggregate_estimate:
    hit_rate: 0.48                    # 推測（30戦40%〜7戦85%の加重推定）
    recovery_rate: 1.06               # 推測（複数検証の加重平均）
    confidence: "LOW（サンプル数不足・短期バイアス）"
    note: |
      短期検証（7戦）の85%は統計的に意味が薄い。
      最長30戦（40%、ROI 104%）が最信頼データ。
      note上の15,064件全体の成績は不明。

  # 主戦術別推定
  main_pick_only_recovery_rate: 0.785  # 事実（レビューサイト記載）
  combined_picks_recovery_rate: 1.040  # 事実（30戦検証）

# ─────────────────────────────────────
# 2. 予想スタイル（事実ベース）
# ─────────────────────────────────────
prediction_style:
  core_philosophy: "厳選予想・本命2点以内"  # 事実（自己申告）
  self_description: |
    "競艇予想屋のカタルです。予想は厳選で本命は2点より多くはしたくないですね。
    穴狙いの時は広めに高配当を取り切りたいと思います。"
  # 事実: 自己紹介文から直接引用（note.com/kataru4649）

  buy_pattern:
    standard_mode:  # 事実（複数事例観察）
      description: "1号艇軸の2点本命"
      examples:
        - "1-23-23（本命2点）"
        - "1-23-4（抑え）"
        - "1-4-23（差しパターン）"
      typical_points: 2  # 事実（「2点勝負」明示）
      typical_odds_target: "10〜70倍"  # 事実（レビュー記載）

    hole_mode:  # 事実（自己申告）
      description: "穴狙い時は広めに展開"
      trigger: "高配当が見込めるレース"
      typical_points: 4  # 推測（事例: 1-23-234の4点セット）

  bet_size:  # 推測（複数レビュー記載）
    per_point: "数万円〜数十万円（自己ベット額）"
    note_subscriber_per_race: "3,000円程度"  # 推測（¥555/記事×点数から推定）

  article_structure:  # 事実（記事タイトルパターン分析）
    title_pattern: "🔥🌐{時間帯}以降🔥🌐狙える🔥🌐資金配分あり🔥{本命N}点勝負🔥"
    content_includes:
      - "対象レース（場名・レース番号）"
      - "展開予想・根拠テキスト"  # 事実（レビュー「展開まで記載」と言及）
      - "買い目（本命・抑え分離）"
      - "資金配分比率"
    grade_coverage: "一般〜G1/SG"  # 事実（G1レースの事例確認）

# ─────────────────────────────────────
# 3. 重視指標（CRE推定）
# ─────────────────────────────────────
weighted_factors:
  # データに基づく定量分析不可のため、コメント例・スタイル記述から推定
  # 信頼度スケール: HIGH / MEDIUM / LOW

  player_ability:
    weight: "HIGH"                  # 事実（コメント例から直接確認）
    evidence: |
      コメント例: "①峰選手の腕が抜群で敵なしですね。
      ２，３号艇もSGクラスの腕で③篠崎選手が安定していますね"
      → 選手個人の評価が予想根拠の中心
    keywords_observed: ["腕が抜群", "SGクラスの腕", "安定している", "敵なし"]

  boat_number_course:
    weight: "HIGH"                  # 推測（1号艇軸支配から）
    evidence: |
      標準買い目: 1-23-23、1-23-4 → 1号艇軸が支配的
      唐津G1例: 本命1-24-24、抑え1-24-36 → 1号艇軸
      → インコース（1号艇）への強い傾倒
    bias_flag: "インコース信頼バイアス（後述）"

  race_development_yoso:
    weight: "HIGH"                  # 事実（複数レビューで「展開まで記載」と言及）
    evidence: "レビューサイト: 「詳しく展開を記載しているので、説得力が増します」"

  motor_performance:
    weight: "MEDIUM"                # 推測（競艇必須情報だが直接言及確認なし）
    evidence: "直接言及なし。ただし競艇予想の標準情報として使用と推測"

  water_surface_conditions:
    weight: "LOW"                   # 推測（言及確認なし）
    evidence: "干満・風向き・波高への言及を第三者資料で確認できず"

  player_relationships:
    weight: "LOW"                   # 推測（師弟・同期への言及確認なし）
    evidence: "師弟関係・同期関係への言及を確認できず"

  recent_results:
    weight: "MEDIUM"                # 推測（直近選手成績は競艇標準指標）
    evidence: "G1選手（峰・篠崎等）のランク言及あり。直近出走成績の参照と推測"

# ─────────────────────────────────────
# 4. 認知バイアス（Mr.Tとの対比）
# ─────────────────────────────────────
cognitive_biases:

  - name: "インコース（1号艇）信頼バイアス"
    severity: "STRONG"
    confidence: "MEDIUM（推測）"
    evidence: |
      全観察事例で1号艇軸の買い目を使用。
      若松12R: 1-X-X系、唐津G1: 1-24-24（本命）、1-24-36（抑え）
    quantitative: |
      唐津G1事例: 1-2-4的中、払戻560円（低配当）
      → インコース軸が的中しても低配当になりやすい
    mr_t_comparison: |
      Mr.T（競輪）: 特定選手への依存バイアス（脇本不発シナリオ依存）
      カタル（競艇）: 1号艇コース固定バイアス
      → 競技特性の違いを反映（競艇のイン勝率は全国平均55%超）
    counter_evidence: "競艇はイン有利なため部分的に合理的。過剰傾倒が問題の可能性"

  - name: "厳選過信バイアス（主観的確信と客観成績の乖離）"
    severity: "MEDIUM"
    confidence: "MEDIUM（推測）"
    evidence: |
      自己申告: 「本当に狙えるときだけ公開」（厳選の強調）
      実績: 30戦最大検証で的中率40%（ROI 104%）
      → 「厳選」の自己評価と客観成績にギャップ
    quantitative: |
      主戦術のみROI: 78.5%（主戦術単独では赤字）
      複合（主戦術＋抑え）: ROI 104%（ほぼトントン）
    mr_t_comparison: |
      Mr.Tの「自信」バイアス（ROI 27%）より軽微。
      カタルは厳選を強調しつつも実際の選別精度は平均的。

  - name: "中穴固定志向バイアス（10-70倍レンジへの収束）"
    severity: "MEDIUM"
    confidence: "HIGH（事実）"
    evidence: "複数レビュー: 「10倍〜70倍あたりの予想を狙う」"
    quantitative: |
      [事実] 的中報告の配当帯: 10-70倍が大多数
      [推測] 10倍未満（人気）と100倍超（大穴）は少ない
    interpretation: |
      中穴は勝率・配当のバランスが良く合理的。
      ただし固定化により高配当機会を逸失する可能性。
    mr_t_comparison: |
      Mr.T: 「大穴」「高配当」明示で最高ROI
      カタル: 中穴レンジ固定 → ROIが安定するが上限も限られる

  - name: "大口資金集中バイアス（自己ベットの歪み）"
    severity: "LOW"
    confidence: "LOW（推測）"
    evidence: |
      複数レビュー: 「1レースに10万〜100万円ベット」
      批判記事: 「人気決着レースに大金をベットして稼いでいる可能性」
    interpretation: |
      自己の大口ベットと読者推奨記事の内容が乖離する可能性。
      高人気（低配当）レースへの自己ベット → 記事では中穴推奨 → 構造的乖離リスク。
    quantitative: "検証不可（自己ベット実績データなし）"

  - name: "夜間・時間帯最適化バイアス"
    severity: "LOW"
    confidence: "LOW（推測）"
    evidence: |
      記事タイトル: "🔥🌐16時以降🔥🌐狙える🔥"（時間帯明示）
      競艇予想はナイター・デイレースの区分が重要
    quantitative: "夜間92%的中率の主張あり（出典: 検証サイト、サンプル不明）"
    caution: "92%は極短期サンプルの可能性が高く、統計的意味は薄い"

# ─────────────────────────────────────
# 5. ずらしパターン
# ─────────────────────────────────────
shift_patterns:
  standard_mode:
    description: "1号艇軸の堅い2点勝負（人気通り）"
    target_odds: "10〜30倍"
    confidence: "HIGH（事実）"

  hole_mode:
    trigger: "高配当・穴が見込めるレース（条件不明確）"    # 推測
    description: "買い目を4点以上に広げ高配当狙い"
    target_odds: "30〜70倍以上"
    confidence: "MEDIUM（自己申告ベース）"
    zurasshi_logic: |
      「穴狙いの時は広めに高配当を取り切りたい」（自己申告）
      → モーター差・展開劣位を認識した時に穴に転換（推測）
      → 具体的ずらし条件は有料記事内のため不明

  grade_pattern:
    g1_above: "SG/G1でも予想公開（事実）"
    note: "重賞レースへの対応あり → 大舞台で穴を狙う志向と推測"

# ─────────────────────────────────────
# 6. 予想テキスト構文パターン
# ─────────────────────────────────────
text_patterns:
  # データ: コメント例（第三者引用）+ 記事タイトルパターン分析

  causal_reasoning_template:
    pattern: "[艇番][選手名]の[能力評価]。[他艇]の[評価]。"
    example: "①峰選手の腕が抜群で敵なしですね。２，３号艇もSGクラスの腕で③篠崎選手が安定していますね"
    note: "選手→艇番の評価順。能力評価が根拠の中心"

  confidence_keywords:
    high_confidence:   # 推測（競艇予想師の一般的表現 + 自己申告から）
      - "狙える"         # 事実（記事タイトルに常出現）
      - "資金配分あり"   # 事実（記事タイトルに常出現）
      - "2点勝負"        # 事実（記事タイトルに常出現）
      - "鉄板"           # 推測
      - "堅い"           # 推測
      - "敵なし"         # 事実（コメント例確認）

    medium_confidence:  # 推測
      - "妙味"
      - "面白い"
      - "チャンス"
      - "期待"

    hole_keywords:      # 推測（自己申告から）
      - "穴"
      - "高配当"
      - "広め"

    negative_keywords:  # 推測（未確認）
      - "不安"
      - "微妙"
      - "信頼できない"

  inverse_indicator_comparison:
    mr_t: "「自信」「見えた」「鉄板」= 逆指標（ROI 0〜36%）"
    kataru: |
      逆指標の特定不可（有料記事アクセスなし）。
      ただし「厳選」自体の効果は30戦ROI 104%（ほぼトントン）。
      「主戦術のみ」ROI 78.5%は赤字 → 主戦術＝逆指標の可能性あり。
    hypothesis: "カタルにおいては「2点本命」自体が逆指標の可能性（抑えがないと赤字）"

