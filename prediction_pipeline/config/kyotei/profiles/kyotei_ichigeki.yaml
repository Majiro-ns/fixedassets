# 競艇一撃 認知プロファイル v2（CRE分析）
# ============================================================
# 生成日: 2026-02-22
# 担当: ashigaru6 (multi-agent-shogun, subtask_021_phase2_cre_v2)
# データソース: kyotei_ichigeki_predictions_full.json (673件統合)
#   - kyotei_ichigeki_predictions_2023.json (255件)
#   - kyotei_ichigeki_predictions_2024.json (230件 ※重複除去後)
#   - kyotei_ichigeki_predictions_2025_2026.json (188件)
# 重複除去: URLベース 3件除去 → 673件
# v1比較: 20件 → 673件（33.65倍のサンプル拡大）
# ============================================================
# ⚠️ 重要な限界:
#   的中結果（result/payout）はboatrace.jp照合が未実施。
#   的中率・回収率の算出は不可能。
#   「推測」と「実測」を以下のルールで明記する:
#     【実測】: ブログテキストから直接確認できた事実
#     【推測】: データから計算・推定した値（ただし的中率/回収率は除く）
#     【算出不可】: boatrace.jp照合なしには求められない値
# ============================================================

profile_id: kyotei_ichigeki_blog_v2
predictor_name: "競艇一撃"
platform: "sblo.jp（Seesaa Blog）"
blog_url: "http://kyotei-ichigeki.sblo.jp/"
