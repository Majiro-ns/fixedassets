analyst: "ashigaru6 (multi-agent-shogun)"

# ─────────────────────────────────────
# 1. 基本統計（実測 vs 推測を明示）
# ─────────────────────────────────────
basic_stats:
  total_articles_analyzed: 673      # 【実測】重複除去後の統合件数
  period: "2023-01 〜 2026-01（約3年間）"
  year_breakdown:
    year_2023: 255                  # 【実測】
    year_2024: 230                  # 【実測】重複除去後
    year_2025_2026: 188             # 【実測】
  article_frequency: "月平均約18.5件（673件/36ヶ月）"  # 【推測】
  blog_history: "2012年頃から継続。2014年8月からメルマガも展開（11年以上継続）"

  # 的中結果に関する注記（全て算出不可）
  hit_rate: null                    # 【算出不可】boatrace.jp照合未実施
  recovery_rate: null               # 【算出不可】boatrace.jp照合未実施
  confirmed_results_note: |
    ⚠️ 673件の的中/不的中はboatrace.jp照合が未実施のため全て不明。
    v1で確認できた1件（1/23尼崎1R: 1-2-3で1020円的中）を除き結果データなし。
    「推測値」も的中率・回収率については記載しない。

  # buy_tickets取得状況（実測）
  buy_tickets_acquisition:
    total_with_tickets: 548         # 【実測】buy_tickets非空の件数
    total_with_tickets_pct: 81.4    # 【実測】%
    year_2023_pct: 95.3             # 【実測】243/255件
    year_2024_pct: 95.7             # 【実測】220/230件（うち57件は「解析失敗」ノイズ）
    year_2025_2026_pct: 45.2        # 【実測】85/188件（多くがbuy_tickets=[]）
    anchor_derivable_count: 491     # 【実測】実際に軸艇番を導出できた件数
    anchor_derivable_pct: 72.9      # 【実測】491/673件
    data_quality_note: |
      2024年データに「解析失敗」「競艇展開法で3連単がジャンジャン当たる」等の
      ノイズが57件含まれる（スクレイピング失敗）。
      2025-2026年データはbuy_tickets=[]が103件（45%）と多く、
      記事フォーマット変更またはスクレイピング精度の問題と推測。

# ─────────────────────────────────────
# 2. コース選択パターン（673件実測）
# ─────────────────────────────────────
course_selection_patterns:

  first_boat_anchor:
    # 軸艇番導出可能491件ベース
    count_overall: 296              # 【実測】491件中296件
    pct_overall: 60.3              # 【実測】%（v1: 65.0%からわずかに低下）
    year_breakdown:
      year_2023: {count: 150, valid_base: 243, pct: 61.7}   # 【実測】
      year_2024: {count: 89,  valid_base: 163, pct: 54.6}   # 【実測】
      year_2025_2026: {count: 57, valid_base: 85, pct: 67.1} # 【実測】
    trend_note: |
      【推測】2024年は54.6%と最も低く、2025-2026年は67.1%と最も高い。
      長期トレンドとしては60%前後で安定している。
      2025-2026のbuy_tickets取得率が45.2%と低いため、
      2025-2026の値はバイアスがかかっている可能性がある。
    description: |
      1号艇（最内コース・イン）を1着軸にする予想が全体の60.3%。
      全国平均のイン勝率約55%を5pt以上上回る高頻度でのイン選択。
      v1（65.0%、20件）と概ね一致しており、イン信頼傾向は長期的に安定している。
    trigger_conditions:
      - "「イン勝率高い」という定性評価"
      - "「近況高リズム」「リズム上昇中」という近況良好評価"
      - "「スタート見えてる」「スタート抜群」という発艇評価"
    cre_note: "673件の大規模データでもv1の傾向を追認。1号艇軸60.3%は安定した特徴。"

  fourth_boat_kado_ichigeki:
    count_overall: 56               # 【実測】491件中56件
    pct_overall: 11.4              # 【実測】%（v1: 25.0%から大幅に低下）
    year_breakdown:
      year_2023: {count: 25, valid_base: 243, pct: 10.3}    # 【実測】
      year_2024: {count: 21, valid_base: 163, pct: 12.9}    # 【実測】
      year_2025_2026: {count: 10, valid_base: 85,  pct: 11.8} # 【実測】
    v1_discrepancy_note: |
      ⚠️ v1（25.0%）との大きな乖離について:
      v1の20件は非1号艇軸7件中5件が4号艇（71%）という計算だったが、
      分母（非1号艇軸件数）と分母（全予想件数）の混在が原因と推測。
      673件では全予想中の4号艇軸率として11.4%が正しい値。
      非1号艇軸（195件）の中での4号艇率: 56/195 = 28.7%（v1の25.0%に近い値）
    non_first_boat_breakdown:
      total_non_first: 195          # 【実測】491件 - 296件
      fourth_boat: {count: 56, pct_among_non_first: 28.7}   # 【実測】
      third_boat:  {count: 61, pct_among_non_first: 31.3}   # 【実測】
      second_boat: {count: 48, pct_among_non_first: 24.6}   # 【実測】
      fifth_boat:  {count: 26, pct_among_non_first: 13.3}   # 【実測】
      sixth_boat:  {count: 4,  pct_among_non_first: 2.1}    # 【実測】
    description: |
      4号艇（カド）を1着軸にするパターンは全体の11.4%。
      非1号艇軸の中では28.7%で最多と思われていたが、
      実際には3号艇（31.3%）がわずかに多い。
      「カドから一撃」の認知的印象が実際のデータより誇張されていた可能性。
    trigger_conditions:
      - "4号艇に「スタート見えてきた」「スタート巧者」の選手がいる"
      - "4号艇に「地元選手」「全速で行けてる」という状態評価"
      - "1号艇のスタートに懸念があるか、1号艇を積極的に信頼しない場合"

  third_boat_anchor:
    count_overall: 61               # 【実測】
    pct_overall: 12.4              # 【実測】%
    note: |
      【推測】v1では1件(5%)の稀なパターンとされていたが、
      673件では12.4%と予想外に多い。3号艇からの捲りパターンが
      「カドから一撃」に次ぐ「ずらし」として機能している可能性。

  second_boat_anchor:
    count_overall: 48               # 【実測】
    pct_overall: 9.8               # 【実測】%
    note: "2号艇からのインよりの展開予測（差し・抜き）を想定したパターン"

  fifth_sixth_boat_anchor:
    count_fifth: 26                 # 【実測】
    count_sixth: 4                  # 【実測】
    pct_fifth: 5.3                 # 【実測】%
    pct_sixth: 0.8                 # 【実測】%
    note: |
      5/6号艇からのまくり差し系は合計6.1%。
      v1の「5号艇・6号艇からのまくりへの言及はほぼ皆無」は過剰な一般化だった。
      5.3%は稀ではあるが「皆無」ではない。

